baseURL = "https://theinterdisciplinary.org/"
languageCode = "en-us"
title = "The Interdisciplinary"
theme = "PaperMod"

[params]
    title = "The Interdisciplinary"
    description = "A Journal for Science, Philosophy and Society"

    # Theme-Einstellungen (Automatischer Wechsel & Button)
    defaultTheme = "auto"
    displayThemeToggle = true

    # Bilder für Browser-Tabs und Social Media (LinkedIn)
    [params.assets]
        favicon = "/favicon.png"
        images = ["/favicon.png"]

    # --- STARTSEITE (Profile Mode) ---
    # Dies ist das Herzstück deiner Landingpage
    [params.profileMode]
        enabled = true
        title = "The Interdisciplinary"
        subtitle = "Exploring the Foundation in the Pursuit of Truth."
        imageUrl = "/images/logo-square.png"
        imageWidth = 150
        imageHeight = 150
    [[params.profileMode.buttons]]
        name = "Read the Journal"
        url = "/posts"

    # --- LOGO OBEN LINKS (Menüleiste) ---
    [params.label]
        text = "The Interdisciplinary"
        icon = "/images/logo-square.png"
        iconHeight = 35

# --- NAVIGATION ---
[menu]
    [[menu.main]]
        identifier = "Mission"
        name = "Our Mission"
        url = "/mission"
        weight = 10
    [[menu.main]]
        identifier = "legal"
        name = "Legal & Privacy"
        url = "/legal"
        weight = 20
